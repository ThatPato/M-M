<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plano 2D de cocina</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f5f1;
      --surface: #ffffff;
      --surface-2: #eef1ec;
      --ink: #202326;
      --muted: #66706a;
      --line: #d7dcd5;
      --strong: #2d4b3f;
      --accent: #2f7468;
      --accent-2: #bd6d3a;
      --danger: #b34e45;
      --wall: #26332f;
      --cabinet: #e6c08c;
      --upper: #b8d0cc;
      --appliance: #ced6dd;
      --service: #f5d872;
      --gas: #e4823f;
      --drain: #4d8db8;
      --window: #86bfd5;
      --filler: #c99173;
      --shadow: 0 10px 28px rgba(36, 48, 42, 0.12);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--ink);
      min-height: 36px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: #9fa9a2;
      background: #f8faf7;
    }

    button.primary {
      background: var(--strong);
      border-color: var(--strong);
      color: white;
    }

    button.danger {
      color: var(--danger);
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 7px 9px;
    }

    input[type="checkbox"] {
      width: 18px;
      min-height: 18px;
      accent-color: var(--accent);
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    label input,
    label select,
    label textarea {
      margin-top: 5px;
    }

    label.mini input,
    .checkbox-line input {
      margin-top: 0;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .brand {
      min-width: 180px;
    }

    .brand h1 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .brand span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(330px, 410px) 1fr;
      min-height: 0;
    }

    .panel {
      border-right: 1px solid var(--line);
      background: var(--surface);
      overflow: auto;
      min-height: calc(100vh - 65px);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 4px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 3;
    }

    .tab {
      min-height: 34px;
      padding: 0 6px;
      font-size: 12px;
      border-radius: 7px;
      overflow-wrap: anywhere;
    }

    .tab.active {
      background: var(--strong);
      color: white;
      border-color: var(--strong);
    }

    .section {
      padding: 14px 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .section p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid.single {
      grid-template-columns: 1fr;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .row.wrap {
      flex-wrap: wrap;
    }

    .row.between {
      justify-content: space-between;
    }

    .row > * {
      min-width: 0;
    }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .item-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 10px;
      box-shadow: 0 1px 0 rgba(38, 51, 47, 0.03);
    }

    .item-card header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 9px;
    }

    .item-card strong {
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .mini {
      min-height: 30px;
      padding: 0 9px;
      font-size: 12px;
    }

    .icon-button {
      width: 34px;
      min-width: 34px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-weight: 700;
    }

    .checkbox-line {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--ink);
      font-size: 13px;
    }

    .canvas-wrap {
      min-height: calc(100vh - 65px);
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
    }

    .summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
    }

    .summary .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .plan-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 280px;
    }

    .zoom-control {
      display: grid;
      grid-template-columns: auto minmax(120px, 180px) 44px;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
    }

    .zoom-control input {
      margin: 0;
      min-height: 20px;
      padding: 0;
      border: 0;
      accent-color: var(--accent);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
    }

    .stage {
      position: relative;
      overflow: hidden;
      padding: 18px;
      background:
        linear-gradient(rgba(53, 69, 62, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(53, 69, 62, 0.08) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .paper {
      width: 100%;
      height: 100%;
      min-height: 580px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: relative;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 580px;
    }

    .legend {
      position: absolute;
      left: 14px;
      bottom: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      max-width: min(760px, calc(100% - 28px));
      pointer-events: none;
    }

    .legend .pill {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      padding: 10px 0;
    }

    .kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      padding: 2px 5px;
      border: 1px solid var(--line);
      border-radius: 5px;
      color: var(--muted);
      background: var(--surface-2);
    }

    dialog {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: min(720px, calc(100vw - 28px));
      width: 720px;
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(32, 35, 38, 0.28);
    }

    .dialog-body {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    textarea {
      min-height: 250px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .print-title {
      display: none;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .panel {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        max-height: none;
      }

      .canvas-wrap,
      .paper,
      svg {
        min-height: 560px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }
    }

    @media (max-width: 620px) {
      .tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid,
      .grid.three {
        grid-template-columns: 1fr;
      }

      .summary {
        align-items: flex-start;
        flex-direction: column;
      }

      .plan-controls {
        width: 100%;
        justify-content: flex-start;
      }

      .zoom-control {
        grid-template-columns: auto minmax(120px, 1fr) 44px;
        width: min(100%, 310px);
      }

      .stage {
        padding: 10px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .topbar,
      .panel,
      .summary,
      .legend {
        display: none;
      }

      .app,
      .layout,
      .canvas-wrap,
      .stage,
      .paper {
        display: block;
        min-height: 0;
        height: auto;
        padding: 0;
        border: 0;
        box-shadow: none;
        background: #fff;
      }

      .print-title {
        display: block;
        margin: 0 0 10px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Plano 2D de cocina</h1>
        <span>Medidas, servicios, aparatos, muebles, finos y fillers</span>
      </div>
      <div class="toolbar">
        <button id="newProject" title="Limpiar proyecto">Nuevo</button>
        <button id="saveJson" title="Descargar archivo JSON">Guardar JSON</button>
        <label class="mini" style="display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);min-height:36px;padding:0 12px;cursor:pointer;">
          Cargar JSON
          <input id="loadJson" type="file" accept="application/json" hidden>
        </label>
        <button id="copyJson" title="Copiar tabla para Excel">Copiar Excel</button>
        <button id="exportPng" class="primary" title="Descargar imagen PNG">PNG</button>
        <button id="printPlan" title="Imprimir plano">Imprimir</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel">
        <nav class="tabs" aria-label="Secciones">
          <button class="tab active" data-tab="walls">Paredes</button>
          <button class="tab" data-tab="services">Servicios</button>
          <button class="tab" data-tab="appliances">Aparatos</button>
          <button class="tab" data-tab="cabinets">Muebles</button>
          <button class="tab" data-tab="finish">Finos</button>
        </nav>

        <section class="section tab-panel" id="tab-walls">
          <h2>Perímetro</h2>
          <div class="grid three">
            <label>
              Proyecto
              <input id="projectName" type="text" autocomplete="off">
            </label>
            <label>
              Sistema
              <select id="unitSystem">
                <option value="cm">Centimetros</option>
                <option value="in">Pulgadas</option>
              </select>
            </label>
            <label>
              Escala
              <select id="scaleMode">
                <option value="auto">Automática</option>
                <option value="fixed">1 cm = 1 px</option>
              </select>
            </label>
          </div>

          <div class="grid three" style="margin-top:12px;">
            <label>
              Ancho <span class="unitText">cm</span>
              <input id="quickWidth" type="number" min="1" step="1" value="360">
            </label>
            <label>
              Fondo <span class="unitText">cm</span>
              <input id="quickDepth" type="number" min="1" step="1" value="260">
            </label>
            <label>
              Muros
              <input id="wallCount" type="number" min="1" max="24" step="1">
            </label>
          </div>

          <div class="row wrap" style="margin-top:12px;">
            <button id="makeRectangle" class="primary">Rectángulo</button>
            <button id="applyWallCount">Aplicar muros</button>
            <button id="addWall">Agregar pared</button>
          </div>

          <div class="list" id="wallsList"></div>
        </section>

        <section class="section tab-panel" id="tab-services" hidden>
          <h2>Servicios y ventanas</h2>
          <div class="grid">
            <label>
              Tipo
              <select id="serviceKind">
                <option value="outlet">Enchufe</option>
                <option value="switch">Apagador</option>
                <option value="gas">Gas</option>
                <option value="drain">Desagüe</option>
                <option value="water">Agua</option>
                <option value="window">Ventana</option>
                <option value="door">Puerta</option>
              </select>
            </label>
            <label>
              Pared cercana
              <select id="serviceWall"></select>
            </label>
            <label>
              Distancia <span class="unitText">cm</span>
              <input id="serviceOffset" type="number" min="0" step="1" value="60">
            </label>
            <label>
              Altura <span class="unitText">cm</span>
              <input id="serviceHeight" type="number" min="0" step="1" value="110">
            </label>
            <label>
              Ancho <span class="unitText">cm</span>
              <input id="serviceWidth" type="number" min="0" step="1" value="0">
            </label>
            <label>
              Nota
              <input id="serviceNote" type="text" autocomplete="off" placeholder="Opcional">
            </label>
          </div>
          <div class="row wrap" style="margin-top:12px;">
            <button id="addService" class="primary">Agregar</button>
          </div>
          <div class="list" id="servicesList"></div>
        </section>

        <section class="section tab-panel" id="tab-appliances" hidden>
          <h2>Aparatos</h2>
          <div class="grid">
            <label>
              Tipo
              <select id="applianceKind">
                <option value="fridge">Refri</option>
                <option value="stove">Estufa</option>
                <option value="cooktop">Parrilla</option>
                <option value="oven">Horno</option>
                <option value="micro">Micro</option>
                <option value="dishwasher">Lavavajillas</option>
                <option value="sink">Tarja</option>
                <option value="washer">Lavadora</option>
              </select>
            </label>
            <label>
              Pared
              <select id="applianceWall"></select>
            </label>
            <label>
              Distancia <span class="unitText">cm</span>
              <input id="applianceOffset" type="number" min="0" step="1" value="80">
            </label>
            <label>
              Ancho <span class="unitText">cm</span>
              <input id="applianceWidth" type="number" min="1" step="1" value="90">
            </label>
            <label>
              Fondo <span class="unitText">cm</span>
              <input id="applianceDepth" type="number" min="1" step="1" value="70">
            </label>
            <label>
              Alto <span class="unitText">cm</span>
              <input id="applianceHeight" type="number" min="1" step="1" value="180">
            </label>
            <label>
              Nombre
              <input id="applianceLabel" type="text" autocomplete="off" placeholder="Opcional">
            </label>
            <label>
              Bloquea mueble
              <select id="applianceBuiltIn">
                <option value="yes">Sí</option>
                <option value="no">No</option>
              </select>
            </label>
          </div>
          <div class="row wrap" style="margin-top:12px;">
            <button id="addAppliance" class="primary">Agregar</button>
          </div>
          <div class="list" id="appliancesList"></div>
        </section>

        <section class="section tab-panel" id="tab-cabinets" hidden>
          <h2>Muebles</h2>
          <div class="grid">
            <label>
              Tipo
              <select id="cabinetKind">
                <option value="base">Base</option>
                <option value="upper">Alacena</option>
                <option value="drawer">Cajonera</option>
                <option value="drawer_2">Cajonera 2 cajones</option>
                <option value="drawer_2_hidden">Cajonera 2 cajones + escondido</option>
                <option value="trash">Bote de basura</option>
                <option value="spice">Especiero</option>
                <option value="spice_hidden_drawer">Especiero con cajon escondido</option>
              </select>
            </label>
            <label>
              Pared
              <select id="cabinetWall"></select>
            </label>
            <label>
              Distancia <span class="unitText">cm</span>
              <input id="cabinetOffset" type="number" min="0" step="1" value="0">
            </label>
            <label>
              Ancho <span class="unitText">cm</span>
              <input id="cabinetWidth" type="number" min="1" step="1" value="60">
            </label>
            <label>
              Fondo <span class="unitText">cm</span>
              <input id="cabinetDepth" type="number" min="1" step="1" value="60">
            </label>
            <label>
              Alto <span class="unitText">cm</span>
              <input id="cabinetHeight" type="number" min="1" step="1" value="90">
            </label>
            <label>
              Nombre
              <input id="cabinetLabel" type="text" autocomplete="off" placeholder="Opcional">
            </label>
            <label>
              Cubierta
              <select id="cabinetCountertop">
                <option value="yes">Sí</option>
                <option value="no">No</option>
              </select>
            </label>
            <label>
              Puertas
              <select id="cabinetDoors">
                <option value="1">1</option>
                <option value="2" selected>2</option>
                <option value="3">3</option>
              </select>
            </label>
          </div>
          <div class="row wrap" style="margin-top:12px;">
            <button id="addCabinet" class="primary">Agregar</button>
          </div>
          <div class="list" id="cabinetsList"></div>
        </section>

        <section class="section tab-panel" id="tab-finish" hidden>
          <h2>Finos y fillers</h2>
          <div class="grid single">
            <label class="checkbox-line">
              <input id="autoFinos" type="checkbox">
              Generar finos de 5/8 en extremos visibles
            </label>
          </div>
          <div class="grid" style="margin-top:12px;">
            <label>
              Tipo
              <select id="finishKind">
                <option value="filler">Filler</option>
                <option value="fino">Fino 5/8</option>
                <option value="cover">Tapón</option>
              </select>
            </label>
            <label>
              Pared
              <select id="finishWall"></select>
            </label>
            <label>
              Distancia <span class="unitText">cm</span>
              <input id="finishOffset" type="number" min="0" step="0.1" value="0">
            </label>
            <label>
              Ancho <span class="unitText">cm</span>
              <input id="finishWidth" type="number" min="0.1" step="0.1" value="1.6">
            </label>
            <label>
              Fondo <span class="unitText">cm</span>
              <input id="finishDepth" type="number" min="0.1" step="0.1" value="60">
            </label>
            <label>
              Alto <span class="unitText">cm</span>
              <input id="finishHeight" type="number" min="1" step="1" value="90">
            </label>
          </div>
          <div class="row wrap" style="margin-top:12px;">
            <button id="addFinish" class="primary">Agregar</button>
          </div>
          <div class="list" id="finishList"></div>
        </section>
      </aside>

      <section class="canvas-wrap">
        <div class="summary">
          <div class="stats" id="stats"></div>
          <div class="plan-controls">
            <label class="zoom-control">
              Zoom
              <input id="planZoom" type="range" min="50" max="200" step="5" value="100">
              <span id="zoomReadout">100%</span>
            </label>
            <button id="resetZoom" class="mini" title="Restablecer zoom">100%</button>
            <span class="kbd" id="scaleReadout">auto</span>
          </div>
        </div>
        <div class="stage">
          <div class="paper" id="paper">
            <h2 class="print-title" id="printTitle">Plano 2D de cocina</h2>
            <svg id="plan" role="img" aria-label="Plano 2D generado"></svg>
            <div class="legend" aria-hidden="true">
              <span class="pill"><i class="dot" style="color:var(--cabinet)"></i>Base</span>
              <span class="pill"><i class="dot" style="color:var(--upper)"></i>Alacena</span>
              <span class="pill"><i class="dot" style="color:var(--appliance)"></i>Aparato</span>
              <span class="pill"><i class="dot" style="color:var(--service)"></i>Enchufe</span>
              <span class="pill"><i class="dot" style="color:var(--gas)"></i>Gas</span>
              <span class="pill"><i class="dot" style="color:var(--drain)"></i>Desagüe</span>
              <span class="pill"><i class="dot" style="color:var(--filler)"></i>Fino/Filler</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <dialog id="jsonDialog">
    <form method="dialog">
      <div class="dialog-body">
        <div class="row between">
          <strong id="dialogTitle">Datos del proyecto</strong>
          <button class="icon-button" value="cancel" title="Cerrar">×</button>
        </div>
        <textarea id="jsonText" spellcheck="false"></textarea>
        <div class="row wrap">
          <button id="applyJson" class="primary" value="default">Aplicar JSON</button>
          <button value="cancel">Cerrar</button>
        </div>
      </div>
    </form>
  </dialog>

  <script>
    const INCH_TO_CM = 2.54;
    const FRACTION_DENOMINATOR = 16;
    const CM_PER_INCH_5_8 = 1.5875;
    const STORAGE_KEY = "plano-cocina-v1";
    const $ = (id) => document.getElementById(id);

    const serviceLabels = {
      outlet: "Enchufe",
      switch: "Apagador",
      gas: "Gas",
      drain: "Desagüe",
      water: "Agua",
      window: "Ventana",
      door: "Puerta"
    };

    const applianceLabels = {
      fridge: "Refri",
      stove: "Estufa",
      cooktop: "Parrilla",
      oven: "Horno",
      micro: "Micro",
      dishwasher: "Lavavajillas",
      sink: "Tarja",
      washer: "Lavadora"
    };

    const cabinetLabels = {
      base: "Base",
      upper: "Alacena",
      drawer: "Cajonera",
      drawer_2: "Cajonera 2 cajones",
      drawer_2_hidden: "Cajonera 2 cajones + escondido",
      trash: "Bote de basura",
      spice: "Especiero",
      spice_hidden_drawer: "Especiero con cajon escondido"
    };

    const finishLabels = {
      filler: "Filler",
      fino: "Fino 5/8",
      cover: "Tapón"
    };

    const directionLabels = {
      E: "Este",
      S: "Sur",
      W: "Oeste",
      N: "Norte"
    };

    const directionVectors = {
      E: { x: 1, y: 0 },
      S: { x: 0, y: 1 },
      W: { x: -1, y: 0 },
      N: { x: 0, y: -1 }
    };

    const colors = {
      wall: "#26332f",
      cabinet: "#e6c08c",
      cabinetStroke: "#8d6337",
      upper: "#b8d0cc",
      upperStroke: "#5a837d",
      appliance: "#ced6dd",
      applianceStroke: "#6d7980",
      service: "#f5d872",
      gas: "#e4823f",
      drain: "#4d8db8",
      window: "#86bfd5",
      filler: "#c99173",
      fillerStroke: "#7d513e"
    };

    let project = loadProject() || defaultProject();
    let currentTab = "walls";
    let measureFormsSeeded = false;

    function defaultProject() {
      return {
        name: "Cocina medida",
        unit: "cm",
        scaleMode: "auto",
        zoom: 1,
        walls: [
          { id: uid(), label: "Pared 1", length: 360, direction: "E" },
          { id: uid(), label: "Pared 2", length: 260, direction: "S" },
          { id: uid(), label: "Pared 3", length: 360, direction: "W" },
          { id: uid(), label: "Pared 4", length: 260, direction: "N" }
        ],
        services: [
          { id: uid(), kind: "outlet", wallId: null, offset: 70, height: 110, width: 0, note: "sobre cubierta" },
          { id: uid(), kind: "gas", wallId: null, offset: 235, height: 55, width: 0, note: "" },
          { id: uid(), kind: "drain", wallId: null, offset: 155, height: 45, width: 0, note: "" },
          { id: uid(), kind: "window", wallId: null, offset: 120, height: 105, width: 120, note: "h=105" }
        ],
        appliances: [
          { id: uid(), kind: "fridge", wallId: null, offset: 0, width: 90, depth: 70, height: 180, label: "", builtIn: true },
          { id: uid(), kind: "stove", wallId: null, offset: 210, width: 76, depth: 65, height: 90, label: "", builtIn: true }
        ],
        cabinets: [
          { id: uid(), kind: "base", wallId: null, offset: 90, width: 60, depth: 60, height: 90, label: "Base 60", countertop: true, doors: 2 },
          { id: uid(), kind: "sink", wallId: null, offset: 150, width: 60, depth: 60, height: 90, label: "Tarja", countertop: true, doors: 2 },
          { id: uid(), kind: "upper", wallId: null, offset: 90, width: 120, depth: 35, height: 70, label: "Alacena", countertop: false, doors: 2 }
        ],
        finishes: [
          { id: uid(), kind: "filler", wallId: null, offset: 286, width: 4, depth: 60, height: 90 }
        ],
        autoFinos: true
      };
    }

    function hydrateDefaults() {
      for (const collection of ["services", "appliances", "cabinets", "finishes"]) {
        project[collection] = project[collection] || [];
      }
      project.walls = project.walls || [];
      project.autoFinos = project.autoFinos !== false;
      project.unit = project.unit === "in" ? "in" : "cm";
      project.scaleMode = project.scaleMode || "auto";
      project.zoom = clamp(cleanNumber(project.zoom, 1), 0.5, 2);
      project.name = project.name || "Cocina medida";
      const firstWall = project.walls[0]?.id || null;
      for (const collection of ["services", "appliances", "cabinets", "finishes"]) {
        project[collection].forEach((item) => {
          item.id = item.id || uid();
          if (!item.wallId || !project.walls.some((wall) => wall.id === item.wallId)) {
            item.wallId = firstWall;
          }
        });
      }
      project.cabinets.forEach((item) => {
        item.doors = clamp(Math.round(cleanNumber(item.doors, 2)), 1, 3);
      });
      project.walls.forEach((wall, index) => {
        wall.id = wall.id || uid();
        wall.label = wall.label || `Pared ${index + 1}`;
        wall.direction = wall.direction || ["E", "S", "W", "N"][index % 4];
        wall.length = cleanNumber(wall.length, 100);
      });
    }

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function cleanNumber(value, fallback = 0) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function gcd(a, b) {
      return b ? gcd(b, a % b) : Math.abs(a);
    }

    function parseInches(value, fallback = 0) {
      const text = String(value ?? "")
        .trim()
        .replace(/[″"]/g, "")
        .replace(/-/g, " ")
        .replace(/,/g, ".");
      if (!text) return fallback;
      const sign = text.startsWith("-") ? -1 : 1;
      const normalized = text.replace(/^[+-]/, "");
      let total = 0;
      let parsed = false;
      normalized.split(/\s+/).forEach((part) => {
        if (!part) return;
        if (part.includes("/")) {
          const [top, bottom] = part.split("/").map(Number);
          if (Number.isFinite(top) && Number.isFinite(bottom) && bottom !== 0) {
            total += top / bottom;
            parsed = true;
          }
          return;
        }
        const number = Number(part);
        if (Number.isFinite(number)) {
          total += number;
          parsed = true;
        }
      });
      return parsed ? sign * total : fallback;
    }

    function formatInchesFraction(inches, denominator = FRACTION_DENOMINATOR) {
      const value = cleanNumber(inches, 0);
      const sign = value < 0 ? "-" : "";
      const rounded = Math.round(Math.abs(value) * denominator);
      const whole = Math.floor(rounded / denominator);
      let numerator = rounded % denominator;
      if (!numerator) return `${sign}${whole}`;
      const divisor = gcd(numerator, denominator);
      numerator /= divisor;
      const reducedDenominator = denominator / divisor;
      return whole
        ? `${sign}${whole} ${numerator}/${reducedDenominator}`
        : `${sign}${numerator}/${reducedDenominator}`;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function currentUnit() {
      return project.unit === "in" ? "in" : "cm";
    }

    function unitLabel() {
      return currentUnit() === "in" ? "pulg" : "cm";
    }

    function toUnit(valueCm, unit) {
      const number = cleanNumber(valueCm);
      return unit === "in" ? number / INCH_TO_CM : number;
    }

    function fromUnit(value, unit, fallbackCm = 0) {
      const number = unit === "in" ? parseInches(value, NaN) : Number(String(value).replace(/,/g, "."));
      if (!Number.isFinite(number)) return fallbackCm;
      return unit === "in" ? number * INCH_TO_CM : number;
    }

    function toDisplayUnit(valueCm) {
      return toUnit(valueCm, currentUnit());
    }

    function fromDisplayUnit(value, fallbackCm = 0) {
      return fromUnit(value, currentUnit(), fallbackCm);
    }

    function formatInputMeasure(valueCm) {
      const number = toDisplayUnit(valueCm);
      if (currentUnit() === "in") return formatInchesFraction(number);
      const decimals = currentUnit() === "in" ? 2 : 1;
      const rounded = Number(number.toFixed(decimals));
      return String(rounded);
    }

    function formatMeasure(valueCm) {
      const number = toDisplayUnit(valueCm);
      if (currentUnit() === "in") return `${formatInchesFraction(number)} pulg`;
      const decimals = currentUnit() === "in" ? 2 : 1;
      const text = Number.isInteger(number) ? String(number) : String(Number(number.toFixed(decimals)));
      return `${text} ${unitLabel()}`;
    }

    function formatCompactMeasure(valueCm) {
      const number = toDisplayUnit(valueCm);
      if (currentUnit() === "in") return `${formatInchesFraction(number)}"`;
      const decimals = currentUnit() === "in" ? 1 : 0;
      const text = String(Number(number.toFixed(decimals)));
      return `${text}cm`;
    }

    function formatCm(value) {
      return formatMeasure(value);
    }

    function convertMeasureInputs(fromUnitName, toUnitName) {
      const measureIds = [
        "serviceOffset", "serviceHeight", "serviceWidth",
        "applianceOffset", "applianceWidth", "applianceDepth", "applianceHeight",
        "cabinetOffset", "cabinetWidth", "cabinetDepth", "cabinetHeight",
        "finishOffset", "finishWidth", "finishDepth", "finishHeight"
      ];
      measureIds.forEach((id) => {
        const input = $(id);
        if (!input) return;
        const valueCm = fromUnit(input.value, fromUnitName, 0);
        input.value = toUnitName === "in"
          ? formatInchesFraction(toUnit(valueCm, toUnitName))
          : String(Number(toUnit(valueCm, toUnitName).toFixed(1)));
      });
    }

    function loadProject() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function saveProject() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(project));
      } catch {
        // El navegador puede bloquear almacenamiento local en algunos entornos.
      }
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 500);
    }

    function getWallOptionsHtml(selectedId) {
      return project.walls.map((wall, index) => {
        const selected = wall.id === selectedId ? "selected" : "";
        return `<option value="${wall.id}" ${selected}>${escapeHtml(wall.label || `Pared ${index + 1}`)}</option>`;
      }).join("");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setInputValues() {
      hydrateDefaults();
      $("projectName").value = project.name;
      $("unitSystem").value = currentUnit();
      $("scaleMode").value = project.scaleMode;
      $("planZoom").value = Math.round(clamp(cleanNumber(project.zoom, 1), 0.5, 2) * 100);
      $("zoomReadout").textContent = `${$("planZoom").value}%`;
      $("wallCount").value = project.walls.length;
      $("autoFinos").checked = project.autoFinos;
      updateUnitLabels();
      seedMeasureFormDefaults();

      const wallSelects = ["serviceWall", "applianceWall", "cabinetWall", "finishWall"];
      wallSelects.forEach((id) => {
        const previous = $(id).value;
        const selected = project.walls.some((wall) => wall.id === previous) ? previous : project.walls[0]?.id;
        $(id).innerHTML = getWallOptionsHtml(selected);
      });

      if (project.walls.length >= 2) {
        $("quickWidth").value = formatInputMeasure(cleanNumber(project.walls[0].length, 360));
        $("quickDepth").value = formatInputMeasure(cleanNumber(project.walls[1].length, 260));
      }
    }

    function updateUnitLabels() {
      document.querySelectorAll(".unitText").forEach((label) => {
        label.textContent = unitLabel();
      });
      const measureIds = [
        "quickWidth", "quickDepth", "serviceOffset", "serviceHeight", "serviceWidth",
        "applianceOffset", "applianceWidth", "applianceDepth", "applianceHeight",
        "cabinetOffset", "cabinetWidth", "cabinetDepth", "cabinetHeight",
        "finishOffset", "finishWidth", "finishDepth", "finishHeight"
      ];
      const step = currentUnit() === "in" ? "0.125" : "1";
      measureIds.forEach((id) => {
        const input = $(id);
        if (input) {
          input.type = currentUnit() === "in" ? "text" : "number";
          input.inputMode = "decimal";
          input.step = step;
        }
      });
      if ($("finishWidth")) $("finishWidth").step = currentUnit() === "in" ? "0.0625" : "0.1";
    }

    function seedMeasureFormDefaults() {
      if (measureFormsSeeded) return;
      const defaults = {
        serviceOffset: 60,
        serviceHeight: 110,
        serviceWidth: 0,
        applianceOffset: 80,
        applianceWidth: 90,
        applianceDepth: 70,
        applianceHeight: 180,
        cabinetOffset: 0,
        cabinetWidth: 60,
        cabinetDepth: 60,
        cabinetHeight: 90,
        finishOffset: 0,
        finishWidth: CM_PER_INCH_5_8,
        finishDepth: 60,
        finishHeight: 90
      };
      Object.entries(defaults).forEach(([id, valueCm]) => {
        if ($(id)) $(id).value = formatInputMeasure(valueCm);
      });
      measureFormsSeeded = true;
    }

    function renderAll() {
      hydrateDefaults();
      setInputValues();
      renderTabs();
      renderLists();
      renderStats();
      renderPlan();
      saveProject();
    }

    function renderTabs() {
      document.querySelectorAll(".tab").forEach((tab) => {
        const active = tab.dataset.tab === currentTab;
        tab.classList.toggle("active", active);
        tab.setAttribute("aria-selected", String(active));
      });
      document.querySelectorAll(".tab-panel").forEach((panel) => {
        panel.hidden = panel.id !== `tab-${currentTab}`;
      });
    }

    function renderLists() {
      renderWallsList();
      renderServicesList();
      renderAppliancesList();
      renderCabinetsList();
      renderFinishList();
    }

    function renderWallsList() {
      const list = $("wallsList");
      if (!project.walls.length) {
        list.innerHTML = `<div class="empty">Agrega al menos una pared para ubicar muebles y servicios.</div>`;
        return;
      }
      list.innerHTML = project.walls.map((wall, index) => `
        <article class="item-card" data-id="${wall.id}">
          <header>
            <strong>${escapeHtml(wall.label)}</strong>
            <button class="icon-button danger" data-action="remove-wall" data-id="${wall.id}" title="Eliminar pared">×</button>
          </header>
          <div class="grid">
            <label>Nombre<input data-wall-field="label" data-id="${wall.id}" type="text" value="${escapeHtml(wall.label)}"></label>
            <label>Largo ${unitLabel()}<input data-wall-field="length" data-id="${wall.id}" type="${currentUnit() === "in" ? "text" : "number"}" inputmode="decimal" min="0.1" step="${currentUnit() === "in" ? "0.125" : "1"}" value="${formatInputMeasure(cleanNumber(wall.length, 0))}"></label>
            <label>Dirección
              <select data-wall-field="direction" data-id="${wall.id}">
                ${Object.entries(directionLabels).map(([value, label]) => `<option value="${value}" ${wall.direction === value ? "selected" : ""}>${label}</option>`).join("")}
              </select>
            </label>
            <label>Orden<input type="text" value="${index + 1}" disabled></label>
          </div>
        </article>
      `).join("");
    }

    function renderServicesList() {
      const list = $("servicesList");
      if (!project.services.length) {
        list.innerHTML = `<div class="empty">Sin servicios ni ventanas registrados.</div>`;
        return;
      }
      list.innerHTML = project.services.map((item) => {
        const wall = wallById(item.wallId);
        const size = item.width ? ` · ancho ${formatCm(item.width)}` : "";
        const note = item.note ? ` · ${escapeHtml(item.note)}` : "";
        return `
          <article class="item-card">
            <header>
              <strong>${serviceLabels[item.kind] || item.kind}</strong>
              <button class="icon-button danger" data-action="remove-service" data-id="${item.id}" title="Eliminar">×</button>
            </header>
            <div class="row between">
              <span>${escapeHtml(wall?.label || "Pared")} · ${formatCm(item.offset)} · h ${formatCm(item.height)}${size}${note}</span>
              <button class="mini" data-action="edit-service" data-id="${item.id}">Editar</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderAppliancesList() {
      const list = $("appliancesList");
      if (!project.appliances.length) {
        list.innerHTML = `<div class="empty">Sin aparatos registrados.</div>`;
        return;
      }
      list.innerHTML = project.appliances.map((item) => listPlacedItem(item, "appliance")).join("");
    }

    function renderCabinetsList() {
      const list = $("cabinetsList");
      if (!project.cabinets.length) {
        list.innerHTML = `<div class="empty">Sin muebles registrados.</div>`;
        return;
      }
      list.innerHTML = project.cabinets.map((item) => listPlacedItem(item, "cabinet")).join("");
    }

    function renderFinishList() {
      const list = $("finishList");
      if (!project.finishes.length) {
        list.innerHTML = `<div class="empty">Sin fillers manuales registrados.</div>`;
        return;
      }
      list.innerHTML = project.finishes.map((item) => {
        const wall = wallById(item.wallId);
        return `
          <article class="item-card">
            <header>
              <strong>${finishLabels[item.kind] || item.kind}</strong>
              <button class="icon-button danger" data-action="remove-finish" data-id="${item.id}" title="Eliminar">×</button>
            </header>
            <div class="row between">
              <span>${escapeHtml(wall?.label || "Pared")} · ${formatCm(item.offset)} · ${formatCm(item.width)} x ${formatCm(item.depth)} · h ${formatCm(item.height)}</span>
              <button class="mini" data-action="edit-finish" data-id="${item.id}">Editar</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function listPlacedItem(item, group) {
      const wall = wallById(item.wallId);
      const labels = group === "appliance" ? applianceLabels : cabinetLabels;
      const title = item.label || labels[item.kind] || item.kind;
      const doors = group === "cabinet" && item.kind === "base"
        ? ` · ${clamp(Math.round(cleanNumber(item.doors, 2)), 1, 3)} puertas`
        : "";
      return `
        <article class="item-card">
          <header>
            <strong>${escapeHtml(title)}</strong>
            <button class="icon-button danger" data-action="remove-${group}" data-id="${item.id}" title="Eliminar">×</button>
          </header>
          <div class="row between">
            <span>${escapeHtml(wall?.label || "Pared")} · ${formatCm(item.offset)} · ${formatCm(item.width)} x ${formatCm(item.depth)} · h ${formatCm(item.height)}${doors}</span>
            <button class="mini" data-action="edit-${group}" data-id="${item.id}">Editar</button>
          </div>
        </article>
      `;
    }

    function renderStats() {
      const linear = project.walls.reduce((sum, wall) => sum + cleanNumber(wall.length, 0), 0);
      $("stats").innerHTML = [
        `${project.walls.length} paredes`,
        `${project.services.length} servicios`,
        `${project.appliances.length} aparatos`,
        `${project.cabinets.length} muebles`,
        `${project.finishes.length} fillers`,
        `${formatCm(linear)} lineales`
      ].map((text) => `<span class="pill">${text}</span>`).join("");
      $("printTitle").textContent = project.name || "Plano 2D de cocina";
    }

    function wallById(id) {
      return project.walls.find((wall) => wall.id === id) || project.walls[0];
    }

    function computeGeometry() {
      let x = 0;
      let y = 0;
      const segments = project.walls.map((wall, index) => {
        const vector = directionVectors[wall.direction] || directionVectors.E;
        const length = Math.max(1, cleanNumber(wall.length, 1));
        const start = { x, y };
        const end = { x: x + vector.x * length, y: y + vector.y * length };
        x = end.x;
        y = end.y;
        return { wall, index, start, end, vector, length };
      });

      const points = segments.flatMap((segment, index) => index === 0 ? [segment.start, segment.end] : [segment.end]);
      const closed = points.length > 2 && distance(points[0], points[points.length - 1]) < 2;
      const area = polygonArea(points);
      const bounds = boundsOf(points);
      const center = { x: (bounds.minX + bounds.maxX) / 2, y: (bounds.minY + bounds.maxY) / 2 };

      segments.forEach((segment) => {
        const right = { x: -segment.vector.y, y: segment.vector.x };
        const left = { x: segment.vector.y, y: -segment.vector.x };
        if (closed && Math.abs(area) > 0.1) {
          segment.normal = area > 0 ? right : left;
        } else {
          const mid = {
            x: (segment.start.x + segment.end.x) / 2,
            y: (segment.start.y + segment.end.y) / 2
          };
          const probeRight = { x: mid.x + right.x * 20, y: mid.y + right.y * 20 };
          const rightScore = distance(probeRight, center);
          const midScore = distance(mid, center);
          segment.normal = rightScore < midScore ? right : left;
        }
      });

      return { segments, points, bounds, closed };
    }

    function polygonArea(points) {
      if (points.length < 3) return 0;
      let area = 0;
      for (let i = 0; i < points.length - 1; i += 1) {
        area += points[i].x * points[i + 1].y - points[i + 1].x * points[i].y;
      }
      return area / 2;
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function boundsOf(points) {
      const xs = points.map((point) => point.x);
      const ys = points.map((point) => point.y);
      return {
        minX: Math.min(...xs, 0),
        maxX: Math.max(...xs, 1),
        minY: Math.min(...ys, 0),
        maxY: Math.max(...ys, 1)
      };
    }

    function pointOnWall(item, segment) {
      const offset = clamp(cleanNumber(item.offset, 0), 0, segment.length);
      return {
        x: segment.start.x + segment.vector.x * offset,
        y: segment.start.y + segment.vector.y * offset
      };
    }

    function rectForItem(item, segment) {
      const width = Math.max(1, cleanNumber(item.width, 1));
      const depth = Math.max(1, cleanNumber(item.depth, 1));
      const p1 = pointOnWall(item, segment);
      const p2 = {
        x: p1.x + segment.vector.x * width,
        y: p1.y + segment.vector.y * width
      };
      const p3 = {
        x: p2.x + segment.normal.x * depth,
        y: p2.y + segment.normal.y * depth
      };
      const p4 = {
        x: p1.x + segment.normal.x * depth,
        y: p1.y + segment.normal.y * depth
      };
      return [p1, p2, p3, p4];
    }

    function renderPlan() {
      const svg = $("plan");
      svg.innerHTML = "";
      const { segments, points, bounds } = computeGeometry();
      if (!segments.length) return;

      const allPoints = [...points];
      const placedCollections = [
        ...project.appliances,
        ...project.cabinets,
        ...project.finishes,
        ...makeAutoFinos()
      ];
      for (const item of placedCollections) {
        const segment = segments.find((entry) => entry.wall.id === item.wallId);
        if (segment) allPoints.push(...rectForItem(item, segment));
      }

      const totalBounds = boundsOf(allPoints);
      const pad = 70;
      const naturalWidth = totalBounds.maxX - totalBounds.minX + pad * 2;
      const naturalHeight = totalBounds.maxY - totalBounds.minY + pad * 2;
      const baseViewBox = [
        totalBounds.minX - pad,
        totalBounds.minY - pad,
        Math.max(300, naturalWidth),
        Math.max(260, naturalHeight)
      ];
      const zoom = clamp(cleanNumber(project.zoom, 1), 0.5, 2);
      const zoomWidth = baseViewBox[2] / zoom;
      const zoomHeight = baseViewBox[3] / zoom;
      const centerX = baseViewBox[0] + baseViewBox[2] / 2;
      const centerY = baseViewBox[1] + baseViewBox[3] / 2;
      const viewBox = [
        centerX - zoomWidth / 2,
        centerY - zoomHeight / 2,
        zoomWidth,
        zoomHeight
      ];
      svg.setAttribute("viewBox", viewBox.join(" "));

      const paperRect = $("paper").getBoundingClientRect();
      const scale = project.scaleMode === "fixed"
        ? 1
        : Math.min((paperRect.width || 900) / viewBox[2], (paperRect.height || 620) / viewBox[3]);
      const scaleUnit = currentUnit() === "in" ? "pulg" : "cm";
      const pxPerDisplayUnit = currentUnit() === "in" ? scale * INCH_TO_CM : scale;
      $("scaleReadout").textContent = project.scaleMode === "fixed"
        ? (currentUnit() === "in" ? "1 pulg = 2.54 px" : "1 cm = 1 px")
        : `auto · ${pxPerDisplayUnit.toFixed(2)} px/${scaleUnit}`;

      appendGrid(svg, viewBox);
      appendWalls(svg, segments);
      appendServices(svg, segments);
      appendItems(svg, segments, project.cabinets, "cabinet");
      appendItems(svg, segments, project.appliances, "appliance");
      appendItems(svg, segments, project.finishes, "finish");
      appendItems(svg, segments, makeAutoFinos(), "auto-fino");
      appendDimensions(svg, segments, bounds);
    }

    function appendGrid(svg, viewBox) {
      const group = node("g", { opacity: "0.45" });
      const [minX, minY, width, height] = viewBox;
      const maxX = minX + width;
      const maxY = minY + height;
      const startX = Math.floor(minX / 50) * 50;
      const startY = Math.floor(minY / 50) * 50;
      for (let x = startX; x <= maxX; x += 50) {
        group.append(node("line", { x1: x, y1: minY, x2: x, y2: maxY, stroke: "#dce2dc", "stroke-width": "0.8" }));
      }
      for (let y = startY; y <= maxY; y += 50) {
        group.append(node("line", { x1: minX, y1: y, x2: maxX, y2: y, stroke: "#dce2dc", "stroke-width": "0.8" }));
      }
      svg.append(group);
    }

    function appendWalls(svg, segments) {
      const group = node("g", { "stroke-linecap": "round", "stroke-linejoin": "round" });
      segments.forEach((segment) => {
        group.append(node("line", {
          x1: segment.start.x,
          y1: segment.start.y,
          x2: segment.end.x,
          y2: segment.end.y,
          stroke: colors.wall,
          "stroke-width": "4"
        }));
        const labelOffset = segment.vector.x === 0 || segment.normal.y < 0 ? 24 : -32;
        const mid = {
          x: (segment.start.x + segment.end.x) / 2 + segment.normal.x * labelOffset,
          y: (segment.start.y + segment.end.y) / 2 + segment.normal.y * labelOffset
        };
        group.append(textNode(mid.x, mid.y, segment.wall.label, {
          fill: "#26332f",
          size: 11,
          weight: 700,
          anchor: "middle"
        }));
      });
      svg.append(group);
    }

    function appendServices(svg, segments) {
      const group = node("g");
      project.services.forEach((item) => {
        const segment = segments.find((entry) => entry.wall.id === item.wallId);
        if (!segment) return;
        const base = pointOnWall(item, segment);
        const normal = segment.normal;
        const center = {
          x: base.x + normal.x * 11,
          y: base.y + normal.y * 11
        };
        if (item.kind === "window" || item.kind === "door") {
          appendOpening(group, item, segment);
          return;
        }
        const color = item.kind === "gas"
          ? colors.gas
          : item.kind === "drain" || item.kind === "water"
            ? colors.drain
            : colors.service;
        group.append(node("circle", {
          cx: center.x,
          cy: center.y,
          r: 7,
          fill: color,
          stroke: "#202326",
          "stroke-width": "1.5"
        }));
        const label = shortServiceLabel(item.kind);
        group.append(textNode(center.x, center.y + 3.5, label, {
          fill: "#202326",
          size: 7.5,
          weight: 800,
          anchor: "middle"
        }));
        group.append(textNode(center.x + normal.x * 13, center.y + normal.y * 13, `h${formatCompactMeasure(item.height)}`, {
          fill: "#66706a",
          size: 8.5,
          anchor: "middle"
        }));
      });
      svg.append(group);
    }

    function appendOpening(group, item, segment) {
      const width = Math.max(16, cleanNumber(item.width, item.kind === "door" ? 90 : 100));
      const p1 = pointOnWall(item, segment);
      const p2 = {
        x: p1.x + segment.vector.x * width,
        y: p1.y + segment.vector.y * width
      };
      const inside = {
        x: segment.normal.x * 5,
        y: segment.normal.y * 5
      };
      const color = item.kind === "door" ? "#9a7654" : colors.window;
      group.append(node("line", {
        x1: p1.x + inside.x,
        y1: p1.y + inside.y,
        x2: p2.x + inside.x,
        y2: p2.y + inside.y,
        stroke: color,
        "stroke-width": "6",
        "stroke-linecap": "butt"
      }));
      group.append(node("line", {
        x1: p1.x + segment.normal.x * 11,
        y1: p1.y + segment.normal.y * 11,
        x2: p2.x + segment.normal.x * 11,
        y2: p2.y + segment.normal.y * 11,
        stroke: "#fff",
        "stroke-width": "2",
        "stroke-linecap": "round"
      }));
      const mid = {
        x: (p1.x + p2.x) / 2 + segment.normal.x * 19,
        y: (p1.y + p2.y) / 2 + segment.normal.y * 19
      };
      group.append(textNode(mid.x, mid.y, `${serviceLabels[item.kind]} ${formatCompactMeasure(width)} h${formatCompactMeasure(item.height)}`, {
        fill: "#3a5d66",
        size: 10,
        weight: 700,
        anchor: "middle"
      }));
    }

    function appendItems(svg, segments, items, groupKind) {
      const group = node("g");
      items.forEach((item) => {
        const segment = segments.find((entry) => entry.wall.id === item.wallId);
        if (!segment) return;
        const rect = rectForItem(item, segment);
        const points = rect.map((point) => `${point.x},${point.y}`).join(" ");
        const style = itemStyle(item, groupKind);
        group.append(node("polygon", {
          points,
          fill: style.fill,
          stroke: style.stroke,
          "stroke-width": style.strokeWidth,
          "stroke-dasharray": style.dash || ""
        }));
        if (style.hatch) appendHatch(group, rect, style.stroke);
        const center = centroid(rect);
        const label = style.label;
        group.append(textNode(center.x, center.y - 2, label, {
          fill: "#202326",
          size: fitLabelSize(label, cleanNumber(item.width, 60)),
          weight: 800,
          anchor: "middle"
        }));
        if (cleanNumber(item.width, 0) >= 35) {
          group.append(textNode(center.x, center.y + 11, `${formatCompactMeasure(item.width)}x${formatCompactMeasure(item.depth)}`, {
            fill: "#52605a",
            size: 8.5,
            anchor: "middle"
          }));
        }
      });
      svg.append(group);
    }

    function itemStyle(item, groupKind) {
      if (groupKind === "finish" || groupKind === "auto-fino") {
        return {
          fill: colors.filler,
          stroke: colors.fillerStroke,
          strokeWidth: "1.5",
          dash: groupKind === "auto-fino" ? "4 3" : "",
          hatch: true,
          label: item.kind === "filler" ? "FIL" : "F"
        };
      }
      if (groupKind === "appliance") {
        return {
          fill: colors.appliance,
          stroke: colors.applianceStroke,
          strokeWidth: "1.5",
          label: applianceShort(item)
        };
      }
      const isUpper = item.kind === "upper";
      return {
        fill: isUpper ? colors.upper : colors.cabinet,
        stroke: isUpper ? colors.upperStroke : colors.cabinetStroke,
        strokeWidth: "1.5",
        dash: isUpper ? "5 4" : "",
        label: cabinetShort(item)
      };
    }

    function appendHatch(group, rect, color) {
      const [p1, p2, p3, p4] = rect;
      const steps = 4;
      for (let i = 1; i < steps; i += 1) {
        const a = lerpPoint(p1, p2, i / steps);
        const b = lerpPoint(p4, p3, i / steps);
        group.append(node("line", {
          x1: a.x,
          y1: a.y,
          x2: b.x,
          y2: b.y,
          stroke: color,
          "stroke-width": "0.7",
          opacity: "0.55"
        }));
      }
    }

    function appendDimensions(svg, segments, bounds) {
      const group = node("g", { fill: "none", stroke: "#8b978f", "stroke-width": "1" });
      segments.forEach((segment) => {
        const offset = 42;
        const a = {
          x: segment.start.x - segment.normal.x * offset,
          y: segment.start.y - segment.normal.y * offset
        };
        const b = {
          x: segment.end.x - segment.normal.x * offset,
          y: segment.end.y - segment.normal.y * offset
        };
        group.append(node("line", { x1: a.x, y1: a.y, x2: b.x, y2: b.y }));
        group.append(node("line", {
          x1: a.x + segment.normal.x * 7,
          y1: a.y + segment.normal.y * 7,
          x2: a.x - segment.normal.x * 7,
          y2: a.y - segment.normal.y * 7
        }));
        group.append(node("line", {
          x1: b.x + segment.normal.x * 7,
          y1: b.y + segment.normal.y * 7,
          x2: b.x - segment.normal.x * 7,
          y2: b.y - segment.normal.y * 7
        }));
        const mid = {
          x: (a.x + b.x) / 2 - segment.normal.x * 10,
          y: (a.y + b.y) / 2 - segment.normal.y * 10
        };
        group.append(textNode(mid.x, mid.y, formatCm(segment.length), {
          fill: "#59665f",
          size: 10,
          anchor: "middle"
        }));
      });

      group.append(textNode(bounds.minX, bounds.minY - 58, project.name || "Plano 2D", {
        fill: "#202326",
        size: 16,
        weight: 800,
        anchor: "start"
      }));
      svg.append(group);
    }

    function makeAutoFinos() {
      if (!project.autoFinos) return [];
      const result = [];
      project.walls.forEach((wall) => {
        const intervals = [...project.cabinets, ...project.appliances]
          .filter((item) => item.wallId === wall.id && cleanNumber(item.depth, 0) > 0 && cleanNumber(item.width, 0) > 0)
          .map((item) => {
            const start = cleanNumber(item.offset, 0);
            return {
              start,
              end: start + cleanNumber(item.width, 0),
              depth: cleanNumber(item.depth, 60),
              height: cleanNumber(item.height, 90)
            };
          })
          .sort((a, b) => a.start - b.start);

        const runs = [];
        intervals.forEach((interval) => {
          const current = runs[runs.length - 1];
          if (!current || interval.start > current.end + 1) {
            runs.push({ ...interval });
            return;
          }
          current.end = Math.max(current.end, interval.end);
          current.depth = Math.max(current.depth, interval.depth);
          current.height = Math.max(current.height, interval.height);
        });

        const manualFinishes = project.finishes
          .filter((finish) => finish.wallId === wall.id)
          .map((finish) => {
            const start = cleanNumber(finish.offset, 0);
            return { start, end: start + cleanNumber(finish.width, 0) };
          });
        const hasManualFinish = (candidate) => {
          const start = cleanNumber(candidate.offset, 0);
          const end = start + cleanNumber(candidate.width, 0);
          return manualFinishes.some((finish) => start <= finish.end + 1 && end >= finish.start - 1);
        };
        const pushAutoFino = (candidate) => {
          if (!hasManualFinish(candidate)) result.push(candidate);
        };

        runs.forEach((run, index) => {
          if (run.end - run.start < CM_PER_INCH_5_8 * 2) return;
          pushAutoFino({
            id: `auto-${wall.id}-${index}-a`,
            kind: "fino",
            wallId: wall.id,
            offset: run.start,
            width: CM_PER_INCH_5_8,
            depth: run.depth,
            height: run.height
          });
          pushAutoFino({
            id: `auto-${wall.id}-${index}-b`,
            kind: "fino",
            wallId: wall.id,
            offset: run.end - CM_PER_INCH_5_8,
            width: CM_PER_INCH_5_8,
            depth: run.depth,
            height: run.height
          });
        });
      });
      return result;
    }

    function shortServiceLabel(kind) {
      return {
        outlet: "E",
        switch: "A",
        gas: "G",
        drain: "D",
        water: "W"
      }[kind] || "S";

    function applianceShort(item) {
      return item.label || {
        fridge: "REF",
        stove: "EST",
        cooktop: "PAR",
        oven: "HOR",
        micro: "MIC",
        dishwasher: "LVJ",
        sink: "TAR",
        washer: "LAV"
      }[item.kind] || "APP";
    }

    function cabinetShort(item) {
      return item.label || {
        base: "BASE",
        upper: "ALAC",
        drawer: "CAJ",
        drawer_2: "CAJ2",
        drawer_2_hidden: "CAJ2E",
        trash: "BOTE",
        spice: "ESP",
        spice_hidden_drawer: "ESPE"
      }[item.kind] || "MUE";
    }

    function fitLabelSize(label, width) {
      const textLength = String(label).length || 1;
      return clamp((width / textLength) * 1.2, 7.5, 11);
    }

    function centroid(points) {
      return {
        x: points.reduce((sum, point) => sum + point.x, 0) / points.length,
        y: points.reduce((sum, point) => sum + point.y, 0) / points.length
      };
    }

    function lerpPoint(a, b, amount) {
      return {
        x: a.x + (b.x - a.x) * amount,
        y: a.y + (b.y - a.y) * amount
      };
    }

    function node(name, attributes = {}) {
      const element = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attributes).forEach(([key, value]) => {
        if (value !== undefined && value !== null && value !== "") element.setAttribute(key, value);
      });
      return element;
    }

    function textNode(x, y, text, options = {}) {
      const element = node("text", {
        x,
        y,
        fill: options.fill || "#202326",
        "font-size": options.size || 10,
        "font-weight": options.weight || 500,
        "text-anchor": options.anchor || "start",
        "dominant-baseline": "middle",
        "paint-order": "stroke",
        stroke: options.stroke || "rgba(255,255,255,0.85)",
        "stroke-width": options.strokeWidth || 3,
        "stroke-linejoin": "round"
      });
      element.textContent = text;
      return element;
    }

    function makeRectangle() {

      const depth = Math.max(1, fromDisplayUnit($("quickDepth").value, 260));
      project.walls = [
        { id: uid(), label: "Pared 1", length: width, direction: "E" },
        { id: uid(), label: "Pared 2", length: depth, direction: "S" },
        { id: uid(), label: "Pared 3", length: width, direction: "W" },

    function remapInvalidWallIds() {
      const first = project.walls[0]?.id || null;
      for (const collection of ["services", "appliances", "cabinets", "finishes"]) {

          if (!project.walls.some((wall) => wall.id === item.wallId)) item.wallId = first;

      const count = clamp(Math.round(cleanNumber($("wallCount").value, project.walls.length)), 1, 24);

      while (project.walls.length < count) {

        project.walls.push({
          id: uid(),
          label: `Pared ${index + 1}`,
          length: 100,
          direction: directions[index % directions.length]
        });
      }
      project.walls = project.walls.slice(0, count);
      remapInvalidWallIds();
      renderAll();

    function exportPng() {
      const svg = $("plan");
      const xml = new XMLSerializer().serializeToString(svg);
      const svgBlob = new Blob([xml], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);
      const image = new Image();
      image.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = 1800;
        canvas.height = 1200;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        canvas.toBlob((blob) => {
          if (!blob) return;
          const pngUrl = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = pngUrl;
          link.download = `${safeFilename(project.name || "plano-cocina")}.png`;
          link.click();
          setTimeout(() => URL.revokeObjectURL(pngUrl), 500);
        }, "image/png");
      };
      image.src = url;
    }

    function safeFilename(value) {
      return String(value).toLowerCase().replace(/[^a-z0-9áéíóúñü]+/gi, "-").replace(/^-+|-+$/g, "") || "plano-cocina";
    }

    function excelNumber(valueCm) {
      if (currentUnit() === "in") return formatInchesFraction(toDisplayUnit(valueCm));
      const number = toDisplayUnit(valueCm);
      return String(Number(number.toFixed(1)));
    }

    function excelCell(value) {
      return String(value ?? "").replace(/\t/g, " ").replace(/\r?\n/g, " ").trim();
    }

    function inchesToCm(inches) {
      return inches * INCH_TO_CM;
    }

    function measureForExcel(valueCm) {
      return excelNumber(Math.max(0, cleanNumber(valueCm, 0)));
    }

    function baseExcelName(item, index) {
      const label = String(item.label || "").trim().toUpperCase();
      const match = label.match(/^B\d+/);
      return match ? match[0] : `B${index + 1}`;
    }

    function basePieceRows(item, index) {
      const name = baseExcelName(item, index);
      const doors = clamp(Math.round(cleanNumber(item.doors, 2)), 1, 3);
      const width = cleanNumber(item.width, inchesToCm(34));
      const depth = cleanNumber(item.depth, inchesToCm(23.75));
      const height = cleanNumber(item.height, inchesToCm(30.5));
      const floorWidth = width - inchesToCm(1.25);
      const floorDepth = depth - inchesToCm(11 / 16);
      const doorHeight = height - inchesToCm(1.125);
      const doorWidth = width / doors - inchesToCm(3 / 16);
      const left = [
        [`${name} LAT`, "2", measureForExcel(height), measureForExcel(depth), "BASE", "", "", ""],
        [`${name} SUE`, "1", measureForExcel(floorWidth), measureForExcel(floorDepth), "BASE", "", "", ""],
        [`${name} MED`, "1", measureForExcel(floorWidth), measureForExcel(inchesToCm(11.75)), "BASE", "", "", ""],
        [`${name} TPA`, "1", measureForExcel(height), measureForExcel(floorWidth), "", "", "", ""]
      ];
      const right = [
        [`${name} GOLA`, "1", measureForExcel(floorWidth), measureForExcel(inchesToCm(4)), "BASE", "BASE", "", ""],
        [`${name} PTA`, String(doors), measureForExcel(doorHeight), measureForExcel(doorWidth), "BASE", "BASE", "ALTO", "ALTO"]
      ];
      return { left, right };
    }

    function buildBaseCutListRows() {
      const sideHeaders = ["MUEBLE", "PZ", "BASE", "ANCHO", "BASE", "BASE", "ALTO", "ALTO"];
      const spacer = ["", "", "", ""];
      const rows = [[...sideHeaders, ...spacer, ...sideHeaders]];
      const bases = project.cabinets.filter((item) => item.kind === "base");
      bases.forEach((item, index) => {
        const { left, right } = basePieceRows(item, index);
        const count = Math.max(left.length, right.length);
        for (let rowIndex = 0; rowIndex < count; rowIndex += 1) {
          rows.push([
            ...(left[rowIndex] || Array(sideHeaders.length).fill("")),
            ...spacer,
            ...(right[rowIndex] || Array(sideHeaders.length).fill(""))
          ]);
        }
        rows.push(Array(sideHeaders.length * 2 + spacer.length).fill(""));
      });
      return rows;
    }

    function buildExcelTable() {
      const unit = currentUnit() === "in" ? "pulgadas" : "cm";
      const headers = [
        "Proyecto",
        "Unidad",
        "Seccion",
        "Tipo",
        "Nombre",
        "Pared",
        "Direccion pared",
        "Distancia",
        "Largo",
        "Ancho",
        "Fondo",
        "Alto",
        "Altura servicio",
        "Detalle"
      ];
      const rows = [];
      const pushRow = (data) => rows.push(headers.map((header) => excelCell(data[header])));
      const base = {
        Proyecto: project.name || "Cocina medida",
        Unidad: unit
      };

      project.walls.forEach((wall, index) => {
        pushRow({
          ...base,
          Seccion: "Paredes",
          Tipo: "Pared",
          Nombre: wall.label,
          Pared: wall.label,
          "Direccion pared": directionLabels[wall.direction] || wall.direction,
          Largo: excelNumber(wall.length),
          Detalle: `Orden ${index + 1}`
        });
      });

      project.services.forEach((item) => {
        const wall = wallById(item.wallId);
        pushRow({
          ...base,
          Seccion: "Servicios",
          Tipo: serviceLabels[item.kind] || item.kind,
          Nombre: item.note || "",
          Pared: wall?.label || "",
          "Direccion pared": directionLabels[wall?.direction] || "",
          Distancia: excelNumber(item.offset),
          Ancho: item.width ? excelNumber(item.width) : "",
          "Altura servicio": excelNumber(item.height),
          Detalle: item.kind === "window" || item.kind === "door" ? "Abertura" : item.note || ""
        });
      });

      project.appliances.forEach((item) => {
        const wall = wallById(item.wallId);
        pushRow({
          ...base,
          Seccion: "Aparatos",
          Tipo: applianceLabels[item.kind] || item.kind,
          Nombre: item.label || applianceLabels[item.kind] || item.kind,
          Pared: wall?.label || "",
          "Direccion pared": directionLabels[wall?.direction] || "",
          Distancia: excelNumber(item.offset),
          Ancho: excelNumber(item.width),
          Fondo: excelNumber(item.depth),
          Alto: excelNumber(item.height),
          Detalle: item.builtIn === false ? "No bloquea mueble" : "Bloquea mueble"
        });
      });

      project.cabinets.forEach((item) => {
        const wall = wallById(item.wallId);
        pushRow({
          ...base,
          Seccion: "Muebles",
          Tipo: cabinetLabels[item.kind] || item.kind,
          Nombre: item.label || cabinetLabels[item.kind] || item.kind,
          Pared: wall?.label || "",
          "Direccion pared": directionLabels[wall?.direction] || "",
          Distancia: excelNumber(item.offset),
          Ancho: excelNumber(item.width),
          Fondo: excelNumber(item.depth),
          Alto: excelNumber(item.height),
          Detalle: item.countertop === false ? "Sin cubierta" : "Con cubierta"
        });
      });

      project.finishes.forEach((item) => {
        const wall = wallById(item.wallId);
        pushRow({
          ...base,
          Seccion: "Finos y fillers",
          Tipo: finishLabels[item.kind] || item.kind,
          Nombre: finishLabels[item.kind] || item.kind,
          Pared: wall?.label || "",
          "Direccion pared": directionLabels[wall?.direction] || "",
          Distancia: excelNumber(item.offset),
          Ancho: excelNumber(item.width),
          Fondo: excelNumber(item.depth),
          Alto: excelNumber(item.height),
          Detalle: "Manual"
        });
      });

      makeAutoFinos().forEach((item) => {
        const wall = wallById(item.wallId);
        pushRow({
          ...base,
          Seccion: "Finos automaticos",
          Tipo: "Fino 5/8",
          Nombre: "Fino 5/8",
          Pared: wall?.label || "",
          "Direccion pared": directionLabels[wall?.direction] || "",
          Distancia: excelNumber(item.offset),
          Ancho: excelNumber(item.width),
          Fondo: excelNumber(item.depth),
          Alto: excelNumber(item.height),
          Detalle: "Auto"
        });
      });

      const cutRows = buildBaseCutListRows();
      const allRows = [
        ["DATOS GENERALES"],
        headers,
        ...rows,
        [],
        ["DESPIECE BASES"],
        ...cutRows
      ];
      const tsv = allRows.map((row) => row.map(excelCell).join("\t")).join("\n");
      const html = `
        <strong>DATOS GENERALES</strong>
        <table>
          <thead><tr>${headers.map((header) => `<th>${escapeHtml(header)}</th>`).join("")}</tr></thead>
          <tbody>
            ${rows.map((row) => `<tr>${row.map((cell) => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}
          </tbody>
        </table>
        <br>
        <strong>DESPIECE BASES</strong>
        <table>
          <tbody>
            ${cutRows.map((row, index) => `<tr>${row.map((cell) => index === 0 ? `<th>${escapeHtml(cell)}</th>` : `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}
          </tbody>
        </table>
      `;
      return { tsv, html };
    }

    async function copyExcelTable() {
      const { tsv, html } = buildExcelTable();
      $("dialogTitle").textContent = "Tabla para Excel";
      $("jsonText").value = tsv;
      $("applyJson").hidden = true;
      let copied = false;
      try {
        if (navigator.clipboard?.write && window.ClipboardItem) {
          await navigator.clipboard.write([
            new ClipboardItem({
              "text/plain": new Blob([tsv], { type: "text/plain" }),
              "text/html": new Blob([html], { type: "text/html" })
            })
          ]);
          copied = true;
        }
      } catch {
        copied = false;
      }
      if (!copied) {
        try {
          if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(tsv);
        } catch {
          // El texto queda disponible en el cuadro si el navegador bloquea el portapapeles.
        }
      }
      $("jsonDialog").showModal();
    }

    function bindEvents() {
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          currentTab = tab.dataset.tab;
          renderTabs();
        });
      });

      $("projectName").addEventListener("input", (event) => {
        project.name = event.target.value;
        renderStats();
        saveProject();
      });
      $("unitSystem").addEventListener("change", (event) => {
        const previousUnit = currentUnit();
        project.unit = event.target.value === "in" ? "in" : "cm";
        updateUnitLabels();
        convertMeasureInputs(previousUnit, currentUnit());
        renderAll();
      });
      $("scaleMode").addEventListener("change", (event) => {
        project.scaleMode = event.target.value;
        renderPlan();
        saveProject();
      });
      $("planZoom").addEventListener("input", (event) => {
        project.zoom = clamp(cleanNumber(event.target.value, 100) / 100, 0.5, 2);
        $("zoomReadout").textContent = `${Math.round(project.zoom * 100)}%`;
        renderPlan();
        saveProject();
      });
      $("resetZoom").addEventListener("click", () => {
        project.zoom = 1;
        $("planZoom").value = "100";
        $("zoomReadout").textContent = "100%";
        renderPlan();
        saveProject();
      });
      $("autoFinos").addEventListener("change", (event) => {
        project.autoFinos = event.target.checked;
        renderAll();
      });

      $("makeRectangle").addEventListener("click", makeRectangle);
      $("applyWallCount").addEventListener("click", applyWallCount);
      $("addWall").addEventListener("click", addWall);
      $("addService").addEventListener("click", addService);
      $("addAppliance").addEventListener("click", addAppliance);
      $("addCabinet").addEventListener("click", addCabinet);
      $("addFinish").addEventListener("click", addFinish);
      $("printPlan").addEventListener("click", () => window.print());
      $("exportPng").addEventListener("click", exportPng);

      $("newProject").addEventListener("click", () => {
        if (!confirm("¿Limpiar el proyecto actual?")) return;
        project = defaultProject();
        measureFormsSeeded = false;
        renderAll();
      });

      $("saveJson").addEventListener("click", () => {
        download(`${safeFilename(project.name || "plano-cocina")}.json`, JSON.stringify(project, null, 2), "application/json");
      });

      $("copyJson").addEventListener("click", copyExcelTable);

      $("applyJson").addEventListener("click", (event) => {
        event.preventDefault();
        try {
          project = JSON.parse($("jsonText").value);
          $("jsonDialog").close();
          measureFormsSeeded = false;
          renderAll();
        } catch {
          alert("El JSON no se pudo leer.");
        }
      });

      $("loadJson").addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        try {
          project = JSON.parse(await file.text());
          measureFormsSeeded = false;
          renderAll();
        } catch {
          alert("El archivo no se pudo leer.");
        } finally {
          event.target.value = "";
        }
      });

      document.addEventListener("input", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const wallField = target.dataset.wallField;
        if (wallField) {
          const wall = project.walls.find((entry) => entry.id === target.dataset.id);
          if (!wall) return;
          wall[wallField] = wallField === "length" ? fromDisplayUnit(target.value, wall.length) : target.value;
          renderPlan();
          renderStats();
          saveProject();
        }
      });

      document.addEventListener("change", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const wallField = target.dataset.wallField;
        if (wallField) {
          const wall = project.walls.find((entry) => entry.id === target.dataset.id);
          if (!wall) return;
          wall[wallField] = target.value;
          renderPlan();
          saveProject();
        }
      });

      document.addEventListener("click", (event) => {
        const button = event.target.closest("[data-action]");
        if (!button) return;
        const action = button.dataset.action;
        const id = button.dataset.id;
        if (action === "remove-wall") {
          project.walls = project.walls.filter((wall) => wall.id !== id);
          remapInvalidWallIds();
          renderAll();
        }
        if (action === "remove-service") removeById("services", id);
        if (action === "remove-appliance") removeById("appliances", id);
        if (action === "remove-cabinet") removeById("cabinets", id);
        if (action === "remove-finish") removeById("finishes", id);
        if (action === "edit-service") editIntoForm("services", id);
        if (action === "edit-appliance") editIntoForm("appliances", id);
        if (action === "edit-cabinet") editIntoForm("cabinets", id);
        if (action === "edit-finish") editIntoForm("finishes", id);
      });

      window.addEventListener("resize", () => renderPlan());
    }

    hydrateDefaults();
    bindEvents();
    renderAll();
  </script>
</body>
</html>
